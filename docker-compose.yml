version: "3.9"

services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/app.db
    volumes:
      - db_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-Aiterra CRM}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_META_APP_ID: ${VITE_META_APP_ID:-}
        VITE_AUTH_TOKEN_KEY: ${VITE_AUTH_TOKEN_KEY:-crm_auth_token}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
